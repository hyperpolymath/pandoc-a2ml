# eclexiaiser manifest for pandoc-a2ml

[project]
name = "pandoc-a2ml"

[[functions]]
name = "main"
source = "src/main.rs"
energy-budget-mj = 15

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
